{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="auth-container">
    <div class="row ">
        <!-- Right Side - Registration Form -->
        <div class="col">
            <div class="auth-form-container">
                <div class="auth-form-wrapper">
                    <!-- Logo -->
                    <div class="text-center mb-4 mt-5">
                        <a href="{% url 'home' %}" class="auth-logo">
                            <span class="gradient-text">BP Hotel</span>
                        </a>
                        <p class="text-muted">Create your account</p>
                    </div>

                    <!-- Registration Form -->
                    <form method="post" action="{% url 'register' %}" class="auth-form">
                        {% csrf_token %}
                        <!-- Full Name -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="firstName"  class="form-label">First Name *</label>
                                <input type="text" class="form-control" name="f_name" id="firstName" 
                                       placeholder="First name" required>
                            </div>
                            <div class="col-md-6">
                                <label for="lastName"  class="form-label">Last Name *</label>
                                <input type="text" class="form-control" name="l_name" id="lastName" 
                                       placeholder="Last name" required>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="registerEmail"  class="form-label">Email Address *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i  class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" id="registerEmail" 
                                       placeholder="Enter your email" required>
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="phone" name="username" class="form-label">user name *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="text" name="username" class="form-control" id="phone" 
                                       placeholder="username" required>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="registerPassword" class="form-label">Password *</label>
                                <div class="input-group">
                                    <input type="password"  name="password1" class="form-control" id="registerPassword" 
                                           placeholder="Password" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                               
                            </div>
                            <div class="col-md-6">
                                <label for="confirmPassword" class="form-label">Confirm Password *</label>
                                <div class="input-group">
                                    <input type="password" name="password2" class="form-control" id="confirmPassword" 
                                           placeholder="Confirm password" required>
                                    <button class="btn btn-outline-secondary toggle-password" type="button">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div id="passwordMatch" class="mt-2"></div>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>

                        <!-- Login Link -->
                        <div class="text-center">
                            <p class="mb-0">Already have an account? 
                                <a href="{% url 'signin' %}" class="text-decoration-none fw-bold">Sign in</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}

{% endblock %}
